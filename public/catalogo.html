<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo - FemmConecta</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header><h1>🛍️ Catálogo de productos</h1><nav><a href="index.html">Inicio</a></nav></header>
  <main>
    <div id="productos" class="grid"></div>
  </main>
  <script>
    fetch('/api/productos')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('productos');
        container.innerHTML = data.map(p => `
          <div class="card">
            <img src="${p.imagen}" width="100">
            <h3>${p.nombre}</h3>
            <p>$${p.precio}</p>
            <a href="producto.html?id=${p.id}">Ver tienda</a>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
